name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push engine
        uses: docker/build-push-action@v6
        with:
          context: .
          file: engine/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/engine:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.name }}/engine:latest

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.name }}/backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:latest

  github-release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        env:
          REPO_LC: ${{ github.repository }}
        run: |
          REPO_LC="${REPO_LC,,}"
          prev_tag=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$prev_tag" ]; then
            range="HEAD"
          else
            range="${prev_tag}..HEAD"
          fi
          {
            echo 'NOTES<<EOF'
            echo "## Docker images"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/${REPO_LC}/engine:${{ github.ref_name }}"
            echo "docker pull ghcr.io/${REPO_LC}/backend:${{ github.ref_name }}"
            echo "docker pull ghcr.io/${REPO_LC}/frontend:${{ github.ref_name }}"
            echo '```'
            echo ""
            echo "## Changes since ${prev_tag:-initial}"
            echo ""
            git log --pretty=format:"- %s (%h)" "$range" --
            echo ""
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.NOTES }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$NOTES"
