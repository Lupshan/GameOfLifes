name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format (pinned)
        run: pipx install 'clang-format==22.1.3'

      - name: clang-format dry-run
        run: |
          if find engine/include engine/src engine/tests -type f \( -name '*.cpp' -o -name '*.hpp' \) 2>/dev/null | grep -q .; then
            find engine/include engine/src engine/tests \( -name '*.cpp' -o -name '*.hpp' \) -print0 \
              | xargs -0 clang-format --dry-run --Werror
          else
            echo "No C++ sources yet — skipping clang-format."
          fi

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: ruff format --check (bytecode)
        run: cd bytecode && uv sync && uv run ruff format --check .

      - name: ruff format --check (backend)
        run: cd backend && uv sync && uv run ruff format --check .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: ruff check (bytecode)
        run: cd bytecode && uv sync && uv run ruff check .

      - name: ruff check (backend)
        run: cd backend && uv sync && uv run ruff check .

      - name: pyright (bytecode)
        run: cd bytecode && uv run pyright

      - name: pyright (backend)
        run: cd backend && uv run pyright

  engine:
    name: Engine (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: engine/build
          key: cmake-${{ runner.os }}-${{ hashFiles('engine/**/CMakeLists.txt') }}
          restore-keys: cmake-${{ runner.os }}-

      - name: Configure
        run: |
          if [ -f engine/CMakeLists.txt ]; then
            cmake -S engine -B engine/build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_COMPILER=clang++
          else
            echo "engine/CMakeLists.txt not present yet — skipping."
          fi

      - name: Build
        run: |
          if [ -d engine/build ]; then cmake --build engine/build; fi

      - name: Test
        run: |
          if [ -d engine/build ]; then ctest --test-dir engine/build --output-on-failure; fi

  bytecode:
    name: Bytecode (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true
      - run: cd bytecode && uv sync
      - run: cd bytecode && uv run pytest

  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true
      - run: cd backend && uv sync
      - run: cd backend && uv run pytest
