services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gameoflifes
      POSTGRES_USER: gol
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      GOL_DATABASE_URL: postgresql+asyncpg://gol:${POSTGRES_PASSWORD:-changeme}@postgres:5432/gameoflifes
      GOL_JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GOL_DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - engine

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

volumes:
  pgdata:
