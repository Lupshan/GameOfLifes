# Dev overrides: bind mounts for hot reload.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend/app:/app/app:ro
      - ./bytecode:/bytecode:ro
    environment:
      GOL_DEBUG: "true"
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
